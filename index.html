<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>Vireon | Imperial Archive</title>


    <link rel="stylesheet" href="style.css">

</head>


<body>


<main class="imperial-container">



    <!-- Profile -->

    <section class="profile-section">


        <div class="seal-frame">

            <img
                id="profile-avatar"
                src="assets/avatar.png"
                alt="Vireon"
            >

        </div>



        <h1 id="profile-name">
            Vireon
        </h1>


        <h2 id="profile-title">
            Imperial Archive
        </h2>


        <p id="profile-description">
            Developer • Reader • Creator
        </p>


    </section>





    <!-- Social Links -->

    <section class="archive-section">


        <h3>
            帝國連結
        </h3>


        <div
            id="social-links"
            class="card-grid"
        ></div>


    </section>





    <!-- Stats Overview -->

    <section class="archive-section">


        <h3>
            功績記錄
        </h3>


        <div
            id="stats-card"
            class="card"
        ></div>


    </section>





    <!-- GitHub -->

    <section class="archive-section">


        <h3>
            天命紀錄
        </h3>


        <div
            id="github-card"
            class="card"
        ></div>


    </section>





    <!-- AniList -->

    <section class="archive-section">


        <h3>
            藏書閣
        </h3>


        <div
            id="anilist-card"
            class="card"
        ></div>


    </section>





    <!-- Last.fm -->

    <section class="archive-section">


        <h3>
            樂府
        </h3>


        <div
            id="lastfm-card"
            class="card"
        ></div>


    </section>





    <!-- Projects -->

    <section class="archive-section">


        <h3>
            功績碑
        </h3>


        <div
            id="projects"
            class="card-grid"
        ></div>


    </section>



</main>



<script
    type="module"
    src="script.js">
</script>


</body>

</html>
