<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>Vireon | Imperial Archive</title>


    <!-- Imperial Typography -->

    <link rel="stylesheet" href="fonts/fonts.css">


    <!-- Main Theme -->

    <link rel="stylesheet" href="style.css">

</head>



<body>


    <!-- Background Decoration Layer -->

    <div class="imperial-background">

        <!-- Future:
             Dragon SVG
             Phoenix SVG
             Cloud Patterns
        -->

    </div>





    <main class="imperial-container">



        <!-- Profile / Imperial Seal -->

        <section class="profile-section">


            <div class="imperial-seal">


                <div class="seal-frame">


                    <img
                        id="profile-avatar"
                        src="assets/avatar.png"
                        alt="Vireon"
                    >


                </div>


            </div>





            <h1 id="profile-name">
                Vireon
            </h1>




            <h2 id="profile-title">
                Imperial Archive
            </h2>





            <p id="profile-description">
                Developer • Reader • Creator
            </p>



        </section>







        <div class="archive-wrapper">





            <!-- Social Links -->


            <section class="archive-section">


                <h3>
                    帝國連結
                </h3>


                <div
                    id="social-links"
                    class="card-grid"
                ></div>


            </section>








            <!-- Overview Statistics -->


            <section class="archive-section">


                <h3>
                    功績記錄
                </h3>


                <div
                    id="stats-card"
                    class="card"
                ></div>


            </section>








            <!-- GitHub Archive -->


            <section class="archive-section">


                <h3>
                    天命紀錄
                </h3>


                <div
                    id="github-card"
                    class="card"
                ></div>


            </section>








            <!-- AniList Library -->


            <section class="archive-section">


                <h3>
                    藏書閣
                </h3>


                <div
                    id="anilist-card"
                    class="card"
                ></div>


            </section>








            <!-- Last.fm Music -->


            <section class="archive-section">


                <h3>
                    樂府
                </h3>


                <div
                    id="lastfm-card"
                    class="card"
                ></div>


            </section>








            <!-- Projects / Achievements -->


            <section class="archive-section">


                <h3>
                    功績碑
                </h3>


                <div
                    id="projects"
                    class="card-grid"
                ></div>


            </section>





        </div>



    </main>







    <!-- Imperial Footer -->


    <footer class="imperial-footer">


        <div class="footer-seal">

            帝

        </div>



        <p>
            Vireon Imperial Archive
        </p>


    </footer>







    <script
        type="module"
        src="script.js">
    </script>



</body>


</html>
